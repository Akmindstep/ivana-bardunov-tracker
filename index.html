<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ivana Bardunov - Studio Tracker</title>
    <!-- Bibliothèques - Chargement Cloud -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- SDK Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --brand-teal: #0d9488;
            --brand-rose: #f43f5e;
            --brand-amber: #f59e0b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .recharts-cartesian-grid-horizontal line { stroke-opacity: 0.05; }
        
        .glass-card {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        input, select, textarea {
            font-size: 16px !important;
            appearance: none;
            -webkit-appearance: none;
            border-radius: 1rem;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #0d948844; border-radius: 10px; }
        
        .loading-screen { display: flex; height: 100vh; align-items: center; justify-content: center; background: #f8fafc; flex-direction: column; gap: 1.5rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .chart-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chart-center-label {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            text-align: center;
        }

        /* Harmonisation des hauteurs inputs */
        input[type="date"], input[type="text"], input[type="number"], select {
            height: 3.5rem;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root">
        <div class="loading-screen">
            <div style="border: 3px solid #f3f3f3; border-top: 3px solid var(--brand-teal); border-radius: 50%; width: 45px; height: 45px; animation: spin 0.8s linear infinite;"></div>
            <p style="color: #64748b; font-size: 15px; font-weight: 600;">Chargement...</p>
        </div>
    </div>

    <script type="text/babel">
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell, LabelList } = window.Recharts;
        const { useState, useMemo, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDV_kmvQC6yAtA95efs33S17SiYopp0r2c",
            authDomain: "ak-minstep-consult-tracker.firebaseapp.com",
            projectId: "ak-minstep-consult-tracker",
            storageBucket: "ak-minstep-consult-tracker.firebasestorage.app",
            messagingSenderId: "1076236018116",
            appId: "1:1076236018116:web:6999f5de95bb0ba0528491"
        };

        const currentAppId = 'ivana-studio-tracker';

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const TABS = [
            { id: 'monthly', label: 'Mensuel', icon: 'calendar' },
            { id: 'annual', label: 'Annuel', icon: 'bar-chart-3' },
            { id: 'list', label: 'Journal', icon: 'list' },
            { id: 'settings', label: 'Réglages', icon: 'settings' },
        ];

        const LIGHT_COLORS = ['#0d9488', '#1e293b', '#6366f1', '#f59e0b', '#ec4899', '#8b5cf6', '#10b981', '#ef4444'];
        const DARK_COLORS = ['#2dd4bf', '#94a3b8', '#818cf8', '#fbbf24', '#f472b6', '#a78bfa', '#34d399', '#f87171'];
        const DIGITAL_KEYS = ["Virement", "Lydia", "Paylib", "Carte", "Stripe", "PayPal", "Bancaire"];

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('monthly');
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [zoom, setZoom] = useState(100);
            const [currentDate, setCurrentDate] = useState(new Date());
            const [sessions, setSessions] = useState([]);
            const [entryType, setEntryType] = useState('shooting');

            const [shootingTypes, setShootingTypes] = useState(["Portrait", "Mariage", "Grossesse", "Bébé", "Évènement", "Corporate"]);
            const [locations, setLocations] = useState(["Studio", "Extérieur", "Domicile"]);
            const [paymentMethods, setPaymentMethods] = useState(["Virement", "Espèces", "Lydia/Paylib", "Chèque"]);
            const [expenseCategories, setExpenseCategories] = useState(["Cotisations URSSAF", "Assurance", "Loyer/Studio", "Matériel", "Logiciels", "Marketing", "Frais bancaires", "Autre"]);
            
            const [editingId, setEditingId] = useState(null);
            const [deleteConfirmId, setDeleteConfirmId] = useState(null);
            const [viewingSession, setViewingSession] = useState(null);

            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                client: '', type: "Portrait", location: "Studio", modality: "Présentiel",
                price: '', expenses: '', hours: '', isPaid: false, isCancelled: false, paymentMethod: "Virement", notes: '',
                expenseCategory: 'Cotisations URSSAF', label: ''
            });

            // Remonter en haut de page lors du changement de vue ou d'onglet
            useEffect(() => {
                window.scrollTo(0, 0);
            }, [view, viewingSession, editingId]);

            useEffect(() => {
                const unsubAuth = auth.onAuthStateChanged(async (user) => {
                    if (user) { setUser(user); } else {
                        try { await auth.signInAnonymously(); } catch (err) { console.error("Auth error:", err); }
                    }
                });
                return () => unsubAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const collectionPath = `artifacts/${currentAppId}/public/data/shootings`;
                const unsub = db.collection(collectionPath).onSnapshot(snapshot => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setSessions(data.sort((a, b) => new Date(b.date) - new Date(a.date)));
                }, err => console.error("Firestore Error:", err));

                const configPath = `artifacts/${currentAppId}/public/data/config/preferences`;
                db.doc(configPath).onSnapshot(doc => {
                    if (doc.exists) {
                        const prefs = doc.data();
                        if (Array.isArray(prefs.shootingTypes)) setShootingTypes(prefs.shootingTypes);
                        if (Array.isArray(prefs.locations)) setLocations(prefs.locations);
                        if (Array.isArray(prefs.paymentMethods)) setPaymentMethods(prefs.paymentMethods);
                        if (Array.isArray(prefs.expenseCategories)) setExpenseCategories(prefs.expenseCategories);
                        if (prefs.isDarkMode !== undefined) setIsDarkMode(prefs.isDarkMode);
                        if (prefs.zoom) setZoom(prefs.zoom);
                    }
                });
                return () => unsub();
            }, [user]);

            const savePreferences = async (newPrefs) => {
                if (!user) return;
                await db.doc(`artifacts/${currentAppId}/public/data/config/preferences`).set(newPrefs, { merge: true });
            };

            const handleFormSubmit = async (e) => {
                e.preventDefault();
                if (!user) return;
                const data = { 
                    ...formData, 
                    entryType,
                    price: Number(formData.price || 0),
                    expenses: Number(formData.expenses || 0),
                    hours: Number(formData.hours || 0),
                    updatedAt: Date.now()
                };
                const colRef = db.collection(`artifacts/${currentAppId}/public/data/shootings`);
                if (editingId) {
                    await colRef.doc(editingId).update(data);
                } else {
                    await colRef.add({ ...data, createdAt: Date.now() });
                }
                resetForm();
                setView('list');
            };

            const togglePaid = async (e, id, currentStatus) => {
                e.stopPropagation();
                if (!user) return;
                await db.doc(`artifacts/${currentAppId}/public/data/shootings/${id}`).update({ isPaid: !currentStatus });
            };

            const deleteSession = async (id) => {
                if (!user) return;
                await db.doc(`artifacts/${currentAppId}/public/data/shootings/${id}`).delete();
                setDeleteConfirmId(null);
            };

            const resetForm = () => {
                setEditingId(null);
                setFormData({
                    date: new Date().toISOString().split('T')[0],
                    client: '', type: shootingTypes[0], location: locations[0], modality: "Présentiel",
                    price: '', expenses: '', hours: '', isPaid: false, isCancelled: false, paymentMethod: paymentMethods[0], notes: '',
                    expenseCategory: expenseCategories[0], label: ''
                });
            };

            const startEdit = (e, s) => { 
                e.stopPropagation(); 
                setViewingSession(null); 
                setEntryType(s.entryType || 'shooting');
                setEditingId(s.id); 
                setFormData(s); 
                setView('add'); 
            };

            const selectedMonthIdx = currentDate.getMonth();
            const selectedYear = currentDate.getFullYear();
            const selectedMonthLabel = currentDate.toLocaleString('fr-FR', { month: 'long', year: 'numeric' });

            const stats = useMemo(() => {
                const annualData = (sessions || []).filter(s => s && s.date && new Date(s.date).getFullYear() === selectedYear);
                const monthlyData = annualData.filter(s => new Date(s.date).getMonth() === selectedMonthIdx);

                const compute = (data) => {
                    const caEncaisse = data.filter(s => s.entryType !== 'expense' && s.isPaid && !s.isCancelled).reduce((acc, s) => acc + Number(s.price || 0), 0);
                    const impayes = data.filter(s => s.entryType !== 'expense' && !s.isPaid && !s.isCancelled).reduce((acc, s) => acc + Number(s.price || 0), 0);
                    const shootingFees = data.filter(s => s.entryType !== 'expense').reduce((acc, s) => acc + Number(s.expenses || 0), 0);
                    const proExpenses = data.filter(s => s.entryType === 'expense').reduce((acc, s) => acc + Number(s.price || 0), 0);
                    const totalExpenses = shootingFees + proExpenses;
                    const totalHours = data.filter(s => s.entryType !== 'expense' && !s.isCancelled).reduce((acc, s) => acc + Number(s.hours || 0), 0);
                    const profitNet = caEncaisse - totalExpenses;
                    const hourlyRate = totalHours > 0 ? caEncaisse / totalHours : 0;
                    
                    const byType = (shootingTypes || []).map(t => ({ 
                        name: t, value: data.filter(s => s.entryType !== 'expense' && s.type === t && !s.isCancelled).reduce((acc, s) => acc + Number(s.price || 0), 0) 
                    })).filter(v => v.value > 0);

                    const logisticData = [
                        { name: 'Studio', value: data.filter(s => s.entryType !== 'expense' && s.location === "Studio" && !s.isCancelled).length }, 
                        { name: 'Ext/Dom', value: data.filter(s => s.entryType !== 'expense' && s.location !== "Studio" && !s.isCancelled).length }
                    ].filter(v => v.value > 0);

                    return { caEncaisse, impayes, totalExpenses, profitNet, totalHours, hourlyRate, byType, logisticData };
                };

                const months = ["Jan", "Fév", "Mar", "Avr", "Mai", "Jun", "Jul", "Aoû", "Sep", "Oct", "Nov", "Déc"];
                const monthlyEvolution = months.map((m, i) => {
                    const mData = annualData.filter(s => new Date(s.date).getMonth() === i);
                    return { 
                        name: m, 
                        ca: mData.filter(s => s.entryType !== 'expense' && !s.isCancelled).reduce((acc, s) => acc + Number(s.price || 0), 0), 
                        dep: mData.filter(s => s.entryType === 'expense').reduce((acc, s) => acc + Number(s.price || 0), 0) + mData.filter(s => s.entryType !== 'expense').reduce((acc, s) => acc + Number(s.expenses || 0), 0) 
                    };
                });

                return { monthly: compute(monthlyData), annual: compute(annualData), evolution: monthlyEvolution };
            }, [sessions, shootingTypes, selectedMonthIdx, selectedYear]);

            const activeStats = view === 'monthly' ? stats.monthly : stats.annual;
            const currentColors = isDarkMode ? DARK_COLORS : LIGHT_COLORS;
            const chartTextColor = isDarkMode ? '#94a3b8' : '#64748b';

            if (!user) return <div className="loading-screen"><div style={{ border: "3px solid #f3f3f3", borderTop: "3px solid var(--brand-teal)", borderRadius: "50%", width: "45px", height: "45px", animation: "spin 0.8s linear infinite" }}></div></div>;

            return (
                <div className={`min-h-screen transition-colors duration-500 ${isDarkMode ? 'bg-[#0f172a] text-slate-100' : 'bg-slate-50 text-slate-900'}`}>
                    
                    {/* Header Desktop */}
                    <nav className={`hidden md:flex sticky top-0 z-50 h-16 items-center justify-between px-8 border-b glass-card ${isDarkMode ? 'bg-[#1e293b]/80 border-slate-800' : 'bg-white/80 border-slate-200'} shadow-sm`}>
                        <div className="flex items-center gap-3">
                            <div className="bg-teal-600 p-2 rounded-xl shadow-lg"><Icon name="camera" className="text-white" size={18}/></div>
                            <div className="flex flex-col"><span className="text-lg font-black tracking-tight italic leading-none">Ivana Bardunov</span><span className="text-[8px] font-bold text-teal-600 uppercase tracking-[0.3em]">STUDIO PRO CLOUD</span></div>
                        </div>
                        <div className={`flex items-center gap-1 p-1 rounded-xl ${isDarkMode ? 'bg-slate-800' : 'bg-slate-100'}`}>
                            {TABS.map(tab => (
                                <button key={tab.id} onClick={() => setView(tab.id)} className={`flex items-center gap-2 px-4 py-2 rounded-lg font-bold text-xs transition-all ${view === tab.id ? (isDarkMode ? 'text-teal-400 bg-slate-900' : 'text-teal-600 bg-white shadow-md') : 'text-slate-500'}`}>{tab.label}</button>
                            ))}
                        </div>
                        <button onClick={() => {setIsDarkMode(!isDarkMode); savePreferences({isDarkMode: !isDarkMode});}} className={`p-2 rounded-full ${isDarkMode ? 'text-yellow-400' : 'text-slate-400'}`}><Icon name={isDarkMode ? 'sun' : 'moon'} /></button>
                    </nav>

                    {/* Navbar Mobile */}
                    <nav className={`md:hidden fixed bottom-0 left-0 right-0 z-[100] h-16 flex items-center justify-around border-t glass-card ${isDarkMode ? 'bg-[#1e293b]/95 border-slate-800' : 'bg-white/95 border-slate-200'} px-2 rounded-t-2xl shadow-lg`}>
                        {TABS.map(tab => (
                            <button key={tab.id} onClick={() => setView(tab.id)} className={`flex flex-col items-center justify-center gap-1 w-14 transition-all ${view === tab.id ? 'text-teal-600 font-black' : 'text-slate-400'}`}><Icon name={tab.icon} size={20} /><span className="text-[8px] uppercase tracking-tighter">{tab.label}</span></button>
                        ))}
                    </nav>

                    <main className="p-4 md:p-8 max-w-[1400px] mx-auto pb-24 md:pb-12 text-left">
                        <header className="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                {(view === 'monthly' || view === 'annual') && <button onClick={() => view === 'monthly' ? (currentDate.setMonth(currentDate.getMonth()-1), setCurrentDate(new Date(currentDate))) : (currentDate.setFullYear(currentDate.getFullYear()-1), setCurrentDate(new Date(currentDate)))}><Icon name="chevron-left" className="text-teal-600" size={24}/></button>}
                                <h2 className="text-2xl md:text-3xl font-black italic tracking-tighter capitalize">{view === 'monthly' ? selectedMonthLabel : view === 'annual' ? `Bilan ${selectedYear}` : view === 'list' ? "Journal d'activité" : "Réglages"}</h2>
                                {(view === 'monthly' || view === 'annual') && <button onClick={() => view === 'monthly' ? (currentDate.setMonth(currentDate.getMonth()+1), setCurrentDate(new Date(currentDate))) : (currentDate.setFullYear(currentDate.getFullYear()+1), setCurrentDate(new Date(currentDate)))}><Icon name="chevron-right" className="text-teal-600" size={24}/></button>}
                            </div>
                            {(view === 'monthly' || view === 'annual') && <button onClick={() => setCurrentDate(new Date())} className="self-start px-4 py-1.5 bg-teal-600/10 text-teal-600 text-[10px] font-black uppercase rounded-full border border-teal-600/20">Aujourd'hui</button>}
                        </header>

                        {(view === 'monthly' || view === 'annual') && (
                            <div className="space-y-6">
                                {/* KPI Compacts */}
                                <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                                    <div className={`p-3 rounded-2xl border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100'} shadow-sm`}>
                                        <p className="text-[8px] font-black text-slate-400 uppercase mb-1">CA</p>
                                        <p className="text-lg md:text-xl font-black text-teal-600">{activeStats.caEncaisse.toLocaleString()}€</p>
                                    </div>
                                    <div className={`p-3 rounded-2xl border border-rose-500/20 ${isDarkMode ? 'bg-rose-950/20' : 'bg-rose-50'}`}>
                                        <p className="text-[8px] font-black text-rose-500 uppercase mb-1">Attente</p>
                                        <p className="text-lg md:text-xl font-black text-rose-500">{activeStats.impayes.toLocaleString()}€</p>
                                    </div>
                                    <div className={`p-3 rounded-2xl border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100'}`}>
                                        <p className="text-[8px] font-black text-slate-400 uppercase mb-1">Frais</p>
                                        <p className="text-lg md:text-xl font-black text-slate-500">{activeStats.totalExpenses.toLocaleString()}€</p>
                                    </div>
                                    <div className={`p-3 rounded-2xl bg-teal-600 text-white shadow-lg`}>
                                        <p className="text-[8px] font-black text-teal-100 uppercase mb-1">Profit Net</p>
                                        <p className="text-lg md:text-xl font-black">{activeStats.profitNet.toLocaleString()}€</p>
                                    </div>
                                    <div className={`p-3 rounded-2xl border ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-slate-900 text-white'}`}>
                                        <p className="text-[8px] font-black text-teal-200/50 uppercase mb-1">Taux H.</p>
                                        <p className="text-lg md:text-xl font-black text-teal-400">{Math.round(activeStats.hourlyRate)}€/h</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className={`p-6 rounded-3xl border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100'}`}>
                                        <h3 className="text-[10px] font-black uppercase mb-4 text-slate-400 tracking-widest italic">Mobilité</h3>
                                        <div className="h-[180px] chart-container">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart>
                                                    <Pie data={activeStats.logisticData || []} innerRadius="75%" outerRadius="95%" paddingAngle={6} dataKey="value" stroke="none">
                                                        <Cell fill="#0d9488" cornerRadius={10} /><Cell fill={isDarkMode ? '#334155' : '#e2e8f0'} cornerRadius={10} />
                                                    </Pie>
                                                    <Tooltip contentStyle={{borderRadius: '12px', fontSize: '10px'}}/>
                                                </PieChart>
                                            </ResponsiveContainer>
                                            <div className="chart-center-label">
                                                <span className="text-2xl font-black leading-none">{activeStats.logisticData?.reduce((acc,d)=>acc+d.value,0) || 0}</span>
                                                <span className="text-[8px] font-bold uppercase text-slate-400">Dossiers</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className={`p-6 rounded-3xl border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100'}`}>
                                        <h3 className="text-[10px] font-black uppercase mb-4 text-slate-400 tracking-widest italic">Services</h3>
                                        <div className="h-[180px] chart-container">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart>
                                                    <Pie data={activeStats.byType || []} innerRadius="75%" outerRadius="95%" paddingAngle={4} dataKey="value" stroke="none">
                                                        {activeStats.byType.map((e,i) => <Cell key={i} fill={currentColors[i % currentColors.length]} cornerRadius={8} />)}
                                                    </Pie>
                                                    <Tooltip contentStyle={{borderRadius: '12px', fontSize: '10px'}}/>
                                                </PieChart>
                                            </ResponsiveContainer>
                                            <div className="chart-center-label">
                                                <span className="text-xl font-black leading-none">{activeStats.caEncaisse.toLocaleString()}€</span>
                                                <span className="text-[8px] font-bold uppercase text-slate-400">Total CA</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className={`p-6 rounded-3xl border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100'}`}>
                                        <h3 className="text-[10px] font-black uppercase mb-4 text-slate-400 tracking-widest italic text-left">CA vs Frais</h3>
                                        <div className="h-[180px]">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <BarChart data={stats.evolution || []} margin={{top: 25, right: 15, left: 10, bottom: 5}}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke={isDarkMode ? '#ffffff05' : '#00000010'} />
                                                    <XAxis dataKey="name" fontSize={9} tick={{fill: '#94a3b8'}} axisLine={false} tickLine={false} padding={{ left: 15, right: 15 }} />
                                                    <Bar dataKey="ca" fill="#0d9488" radius={[3,3,3,3]} barSize={10} />
                                                    <Bar dataKey="dep" fill="#f43f5e" radius={[3,3,3,3]} barSize={10} />
                                                    <Tooltip cursor={{fill: 'transparent'}} contentStyle={{borderRadius: '10px', fontSize: '10px'}}/>
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'list' && (
                            <div className="space-y-3 animate-in slide-in-from-bottom-4 duration-500">
                                <div className="hidden md:block rounded-3xl border overflow-hidden bg-white dark:bg-slate-900 border-slate-100 dark:border-slate-800">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 dark:bg-slate-800 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                                            <tr><th className="px-6 py-4">Client / Projet</th><th className="px-6 py-4 text-center">Statut</th><th className="px-6 py-4 text-right">Montant</th><th className="px-6 py-4 text-right">Actions</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
                                            {sessions.map(s => (
                                                <tr key={s.id} onClick={() => setViewingSession(s)} className="hover:bg-slate-50 dark:hover:bg-slate-800/50 cursor-pointer transition-all text-left">
                                                    <td className="px-6 py-4"><p className="font-bold text-sm">{s.entryType === 'expense' ? s.label : s.client}</p><p className="text-[10px] text-slate-500 uppercase">{s.date} • {s.entryType === 'expense' ? s.expenseCategory : s.type}</p></td>
                                                    <td className="px-6 py-4 text-center"><span className={`px-3 py-1 rounded-full text-[9px] font-black uppercase ${s.isPaid ? 'bg-teal-500/10 text-teal-600' : (s.entryType === 'expense' ? 'bg-rose-500/10 text-rose-500' : 'bg-rose-100 text-rose-600')}`}>{s.isPaid ? 'Payé' : (s.entryType === 'expense' ? 'Sortie' : 'À payer')}</span></td>
                                                    <td className="px-6 py-4 text-right font-black text-sm text-teal-600">{s.entryType === 'expense' ? '-' : ''}{s.price}€</td>
                                                    <td className="px-6 py-4 text-right flex gap-3 justify-end"><button onClick={(e) => startEdit(e, s)} className="text-slate-400 hover:text-amber-500"><Icon name="edit-3" size={16}/></button><button onClick={(e) => {e.stopPropagation(); setDeleteConfirmId(s.id);}} className="text-slate-400 hover:text-rose-500"><Icon name="trash-2" size={16}/></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="md:hidden space-y-3">
                                    {sessions.map(s => (
                                        <div key={s.id} className={`p-4 rounded-3xl border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100'} shadow-sm flex items-center justify-between`}>
                                            <div className="flex items-center gap-4 flex-1" onClick={() => setViewingSession(s)}>
                                                <div className={`w-10 h-10 flex items-center justify-center rounded-xl shrink-0 ${s.entryType === 'expense' ? 'bg-rose-500/10 text-rose-500' : 'bg-teal-500/10 text-teal-500'}`}><Icon name={s.entryType === 'expense' ? 'receipt' : 'user'} size={18}/></div>
                                                <div className="truncate"><p className="font-bold text-sm tracking-tight text-left">{s.entryType === 'expense' ? s.label : s.client}</p><p className="text-[10px] text-slate-400 uppercase font-bold tracking-tighter truncate text-left">{s.date} • {s.entryType === 'expense' ? 'Charge' : s.type}</p></div>
                                            </div>
                                            <div className="flex flex-col items-end gap-2 shrink-0 ml-4">
                                                <div className="text-right" onClick={() => setViewingSession(s)}>
                                                    <p className={`font-black text-sm ${s.entryType === 'expense' ? 'text-rose-500' : (s.isPaid ? 'text-teal-600' : 'text-rose-500')}`}>{s.entryType === 'expense' ? '-' : ''}{s.price}€</p>
                                                    {!s.isPaid && s.entryType !== 'expense' && <span className="text-[8px] font-black uppercase text-rose-500 bg-rose-50 px-1.5 py-0.5 rounded-md">Impayé</span>}
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={(e) => startEdit(e, s)} className="p-1.5 bg-slate-100 dark:bg-slate-800 rounded-lg text-slate-500"><Icon name="edit-3" size={14}/></button>
                                                    <button onClick={(e) => {e.stopPropagation(); setDeleteConfirmId(s.id);}} className="p-1.5 bg-rose-50 dark:bg-rose-900/20 rounded-lg text-rose-500"><Icon name="trash-2" size={14}/></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'add' && (
                            <div className={`max-w-xl mx-auto p-6 md:p-8 rounded-[2.5rem] border animate-in zoom-in-95 duration-500 ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100 shadow-xl'}`}>
                                <div className="flex gap-1 p-1 bg-slate-500/10 rounded-2xl mb-6">
                                    <button onClick={() => { setEntryType('shooting'); resetForm(); }} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all ${entryType === 'shooting' ? 'bg-teal-600 text-white shadow-md' : 'text-slate-500'}`}>Séance Photo</button>
                                    <button onClick={() => { setEntryType('expense'); resetForm(); }} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all ${entryType === 'expense' ? 'bg-rose-500 text-white shadow-md' : 'text-slate-500'}`}>Dépense Pro</button>
                                </div>

                                <form onSubmit={handleFormSubmit} className="space-y-6 text-left">
                                    {entryType === 'shooting' ? (
                                        <>
                                            <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Client</label><input type="text" placeholder="Nom..." required className={`w-full p-4 rounded-2xl border-none outline-none font-bold text-sm ${isDarkMode ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-900'}`} value={formData.client} onChange={e => setFormData({...formData, client: e.target.value})} /></div>
                                            <div className="space-y-4">
                                                <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Date</label><input type="date" required className={`w-full p-4 rounded-2xl border-none outline-none text-sm font-bold shadow-inner ${isDarkMode ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-900'}`} value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} /></div>
                                                <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Honoraires (€)</label><input type="number" required placeholder="0" className={`w-full p-4 rounded-2xl border-none outline-none font-black text-teal-600 text-lg shadow-inner ${isDarkMode ? 'bg-slate-800' : 'bg-slate-100'}`} value={formData.price} onChange={e => setFormData({...formData, price: e.target.value})} /></div>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div className="space-y-1"><label className="text-[9px] font-black uppercase text-rose-500 ml-1 font-bold">Frais Séance (€)</label><input type="number" placeholder="0" className={`w-full p-4 rounded-2xl border-none outline-none font-bold text-rose-500 text-sm shadow-inner ${isDarkMode ? 'bg-slate-800' : 'bg-slate-100'}`} value={formData.expenses} onChange={e => setFormData({...formData, expenses: e.target.value})} /></div>
                                                <div className="space-y-1"><label className="text-[9px] font-black uppercase text-teal-500 ml-1 font-bold">Temps (h)</label><input type="number" step="0.5" className={`w-full p-4 rounded-2xl border-none outline-none font-bold text-teal-600 text-sm shadow-inner ${isDarkMode ? 'bg-slate-800' : 'bg-slate-100'}`} value={formData.hours} onChange={e => setFormData({...formData, hours: e.target.value})} /></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Prestation</label><select className={`w-full p-4 rounded-2xl border-none outline-none text-sm font-bold shadow-inner ${isDarkMode ? 'bg-slate-800 text-white' : 'bg-slate-100'}`} value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})}>{(shootingTypes || []).map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                                                <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Lieu</label><select className={`w-full p-4 rounded-2xl border-none outline-none text-sm font-bold shadow-inner ${isDarkMode ? 'bg-slate-800 text-white' : 'bg-slate-100'}`} value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})}>{(locations || []).map(l => <option key={l} value={l}>{l}</option>)}</select></div>
                                            </div>
                                        </>
                                    ) : (
                                        <>
                                            <div className="space-y-1"><label className="text-[9px] font-black uppercase text-rose-500 ml-1">Libellé</label><input type="text" placeholder="URSSAF, Adobe..." required className={`w-full p-4 rounded-2xl border-none outline-none font-bold text-sm ${isDarkMode ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-900'}`} value={formData.label} onChange={e => setFormData({...formData, label: e.target.value})} /></div>
                                            <div className="space-y-4">
                                                <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Date</label><input type="date" required className={`w-full p-4 rounded-2xl border-none outline-none text-sm font-bold shadow-inner ${isDarkMode ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-900'}`} value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} /></div>
                                                <div className="space-y-1"><label className="text-[9px] font-black uppercase text-rose-500 ml-1 font-bold">Montant (€)</label><input type="number" required placeholder="0" className={`w-full p-4 rounded-2xl border-none outline-none font-black text-rose-500 text-lg shadow-inner ${isDarkMode ? 'bg-slate-800' : 'bg-slate-100'}`} value={formData.price} onChange={e => setFormData({...formData, price: e.target.value})} /></div>
                                            </div>
                                            <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Catégorie</label><select className={`w-full p-4 rounded-2xl border-none outline-none text-sm font-bold shadow-inner ${isDarkMode ? 'bg-slate-800 text-white' : 'bg-slate-100'}`} value={formData.expenseCategory} onChange={e => setFormData({...formData, expenseCategory: e.target.value})}>{(expenseCategories || []).map(cat => <option key={cat} value={cat}>{cat}</option>)}</select></div>
                                        </>
                                    )}
                                    <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1 italic">Notes</label><textarea placeholder="Détails..." className={`w-full p-4 rounded-2xl border-none outline-none text-sm h-24 resize-none shadow-inner ${isDarkMode ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-900'}`} value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})}></textarea></div>
                                    <button type="submit" className={`w-full py-5 rounded-2xl font-black uppercase text-xs shadow-xl transition-all active:scale-95 ${entryType === 'shooting' ? 'bg-teal-600 shadow-teal-600/20' : 'bg-rose-500 shadow-rose-500/20'} text-white`}>{editingId ? "Mettre à jour" : "Valider l'encodage"}</button>
                                </form>
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="max-w-xl mx-auto space-y-6 text-left pb-12">
                                <div className={`p-6 rounded-3xl border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100'} shadow-sm`}>
                                    <h3 className="text-xs font-black uppercase mb-4 text-teal-500 tracking-widest italic flex items-center gap-2">Préférences App</h3>
                                    <div className="flex justify-between items-center mb-6 p-4 bg-slate-500/5 rounded-2xl">
                                        <div className="flex items-center gap-3"><Icon name={isDarkMode ? 'moon' : 'sun'} className="text-teal-600" /> <span className="text-[10px] font-black uppercase tracking-widest">Mode Sombre</span></div>
                                        <button onClick={() => {setIsDarkMode(!isDarkMode); savePreferences({isDarkMode: !isDarkMode});}} className={`w-10 h-5 rounded-full relative transition-all ${isDarkMode ? 'bg-teal-600' : 'bg-slate-300'}`}><div className={`absolute top-1 w-3 h-3 bg-white rounded-full transition-all ${isDarkMode ? 'left-6' : 'left-1'}`}></div></button>
                                    </div>
                                    <div className="space-y-2 px-1">
                                        <div className="flex justify-between text-[10px] font-black uppercase text-slate-500"><span>Zoom interface</span><span>{zoom}%</span></div>
                                        <input type="range" min="80" max="130" value={zoom} onChange={e => {setZoom(e.target.value); savePreferences({zoom: e.target.value});}} className="w-full h-1.5 bg-slate-200 rounded-full appearance-none cursor-pointer accent-teal-600" />
                                    </div>
                                </div>
                                {[
                                    { title: 'Lieux', data: locations, set: setLocations, field: 'locations', icon: 'map-pin' },
                                    { title: 'Prestations', data: shootingTypes, set: setShootingTypes, field: 'shootingTypes', icon: 'camera' },
                                    { title: 'Charges Pro', data: expenseCategories, set: setExpenseCategories, field: 'expenseCategories', icon: 'receipt' }
                                ].map((section, idx) => (
                                    <div key={idx} className={`p-6 rounded-3xl border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100'} shadow-sm`}>
                                        <h3 className="text-[10px] font-black uppercase mb-4 flex items-center gap-2 text-slate-400 tracking-widest"><Icon name={section.icon} className="text-teal-500" size={14}/> {section.title}</h3>
                                        <div className="space-y-2">
                                            {(section.data || []).map((item, i) => (
                                                <div key={i} className="flex items-center gap-3 group text-left">
                                                    <input type="text" className={`flex-1 p-2 rounded-xl border-none outline-none font-bold text-xs ${isDarkMode ? 'bg-slate-800' : 'bg-slate-50'}`} value={item} 
                                                        onChange={(e) => { const next = [...section.data]; next[i] = e.target.value; section.set(next); savePreferences({[section.field]: next}); }} />
                                                    <button onClick={() => { const next = section.data.filter((_, j) => j !== i); section.set(next); savePreferences({[section.field]: next}); }} className="p-1.5 text-slate-300 hover:text-rose-500 transition-all opacity-0 group-hover:opacity-100 text-left"><Icon name="x" size={14}/></button>
                                                </div>
                                            ))}
                                            <div className="pt-2 text-left"><input placeholder="Ajouter..." className={`w-full p-2 rounded-xl border border-dashed border-slate-300 outline-none font-bold text-xs ${isDarkMode ? 'bg-slate-800' : 'bg-white'}`} onKeyDown={(e) => {
                                                if(e.key === 'Enter' && e.target.value) { const next = [...(section.data || []), e.target.value]; section.set(next); savePreferences({[section.field]: next}); e.target.value = ''; }
                                            }} /></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* MODALE DÉTAILS */}
                    {viewingSession && (
                        <div className="fixed inset-0 z-[300] flex items-end sm:items-center justify-center p-0 sm:p-4 bg-slate-950/80 backdrop-blur-sm animate-in fade-in duration-300">
                            <div className={`relative max-w-lg w-full h-[85vh] sm:h-auto sm:max-h-[90vh] rounded-t-[2.5rem] sm:rounded-[2.5rem] p-6 shadow-2xl border flex flex-col ${isDarkMode ? 'bg-[#1e293b] border-slate-700' : 'bg-white border-slate-200'}`}>
                                <button onClick={() => setViewingSession(null)} className="absolute top-6 right-6 p-2 rounded-full bg-slate-500/10 hover:bg-rose-500/20 hover:text-rose-500 transition-all"><Icon name="x" size={20}/></button>
                                
                                <div className="flex items-center gap-4 mb-6 pr-8">
                                    <div className={`w-12 h-12 flex items-center justify-center rounded-2xl shadow-lg text-white shrink-0 ${viewingSession.entryType === 'expense' ? 'bg-rose-500' : 'bg-teal-600'}`}><Icon name={viewingSession.entryType === 'expense' ? 'receipt' : 'user'} size={24}/></div>
                                    <div className="text-left flex-1 min-w-0">
                                        <h3 className="text-xl font-black italic leading-none truncate">{viewingSession.entryType === 'expense' ? viewingSession.label : viewingSession.client}</h3>
                                        <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">{viewingSession.date}</p>
                                    </div>
                                </div>

                                <div className="overflow-y-auto flex-1 space-y-6 px-1">
                                    <div className="grid grid-cols-2 gap-3 text-left">
                                        <div className={`p-4 rounded-3xl border ${isDarkMode ? 'bg-slate-800/40 border-slate-700' : 'bg-slate-50 border-slate-100'}`}><p className="text-[8px] font-black text-slate-400 uppercase mb-1">Montant</p><p className={`text-xl font-black ${viewingSession.entryType === 'expense' ? 'text-rose-500' : 'text-teal-600'}`}>{viewingSession.price}€</p></div>
                                        <div className={`p-4 rounded-3xl border ${isDarkMode ? 'bg-slate-800/40 border-slate-700' : 'bg-slate-50 border-slate-100'}`}><p className="text-[8px] font-black text-slate-400 uppercase mb-1">{viewingSession.entryType === 'expense' ? 'Charge' : 'Frais'}</p><p className="text-xl font-black text-rose-400">{viewingSession.entryType === 'expense' ? viewingSession.expenseCategory : `${viewingSession.expenses || 0}€`}</p></div>
                                    </div>

                                    <div className="space-y-3 text-left">
                                        <div className="flex items-center gap-3 text-[11px] font-black uppercase text-slate-400 tracking-widest"><Icon name="edit-2" size={12}/> Notes</div>
                                        <div className={`p-5 rounded-3xl text-sm leading-relaxed ${isDarkMode ? 'bg-slate-800/60 text-slate-300' : 'bg-slate-50 text-slate-600 shadow-inner'}`}>{viewingSession.notes || <span className="italic opacity-30">Aucun commentaire.</span>}</div>
                                    </div>
                                    
                                    <div className="flex flex-col gap-2 pt-4 pb-4">
                                        <button onClick={(e) => startEdit(e, viewingSession)} className="w-full py-4 bg-teal-600 text-white rounded-2xl font-black uppercase text-[10px] tracking-[0.2em] shadow-lg shadow-teal-600/20 flex items-center justify-center gap-2"><Icon name="edit-3" size={14}/> Modifier l'encodage</button>
                                        <button onClick={() => setViewingSession(null)} className="w-full py-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-black uppercase text-[10px] tracking-[0.2em]">Fermer</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {view !== 'add' && (
                        <button onClick={() => {setView('add'); resetForm();}} className="fixed bottom-[4.8rem] md:bottom-8 right-6 z-[90] w-14 h-14 bg-teal-600 text-white rounded-2xl shadow-xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all"><Icon name="plus" size={28} /></button>
                    )}

                    {deleteConfirmId && (
                        <div className="fixed inset-0 z-[400] flex items-center justify-center p-6 bg-slate-950/90 backdrop-blur-sm animate-in fade-in duration-200">
                            <div className={`p-6 rounded-[2rem] max-w-[320px] w-full shadow-2xl border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100'}`}>
                                <h3 className="text-lg font-black uppercase text-center mb-4 text-rose-500 flex items-center justify-center gap-2"><Icon name="alert-triangle"/> Supprimer ?</h3>
                                <div className="flex gap-3"><button onClick={() => setDeleteConfirmId(null)} className="flex-1 py-4 rounded-xl font-black uppercase text-[10px] bg-slate-100 text-slate-600">Annuler</button><button onClick={() => deleteSession(deleteConfirmId)} className="flex-1 py-4 rounded-xl font-black uppercase text-[10px] bg-rose-600 text-white shadow-lg">Confirmer</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
